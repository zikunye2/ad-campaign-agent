<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" rx="12" fill="#fafbfc"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="52" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="12" width="900" height="40" fill="url(#headerGrad)"/>
  <text x="450" y="33" text-anchor="middle" fill="white" font-size="18" font-weight="700">Ad Campaign Agent &#8212; Architecture</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- USER -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="340" y="72" width="220" height="52" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="95" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">User</text>
  <text x="450" y="113" text-anchor="middle" font-size="10.5" fill="#3b82f6">Product, Audience, Goal, Message, Tone</text>

  <!-- Arrow: User -> UI -->
  <line x1="450" y1="124" x2="450" y2="148" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- STREAMLIT UI -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="170" y="150" width="560" height="56" rx="10" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="175" text-anchor="middle" font-size="13" font-weight="600" fill="#4f46e5">Streamlit Chat UI</text>
  <text x="450" y="195" text-anchor="middle" font-size="10.5" fill="#6366f1">app.py &#8212; Chat Interface &#183; Sidebar (API Keys, Model, Quality, Style)</text>

  <!-- Arrow: UI -> Agent -->
  <line x1="450" y1="206" x2="450" y2="232" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- AGENT BOX -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="120" y="234" width="660" height="190" rx="12" fill="#f0f4ff" stroke="#1e3a5f" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="258" font-size="14" font-weight="700" fill="#1e3a5f">GPT-5-mini Agent</text>
  <text x="140" y="275" font-size="10.5" fill="#64748b" font-style="italic">agent.py &#8212; Conversation, field extraction, brief generation</text>

  <!-- LLM core (oval) -->
  <ellipse cx="250" cy="352" rx="88" ry="42" fill="#1e3a5f" filter="url(#shadow)"/>
  <text x="250" y="346" text-anchor="middle" font-size="12" font-weight="600" fill="white">GPT-5-mini</text>
  <text x="250" y="363" text-anchor="middle" font-size="9.5" fill="#cbd5e1">Reasoning + Context</text>

  <!-- Steps -->
  <rect x="400" y="296" width="175" height="30" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="410" y="316" font-size="11" fill="#166534"><tspan font-weight="600">&#9312; Validate</tspan> &#8212; check fields</text>

  <rect x="400" y="334" width="175" height="30" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="410" y="354" font-size="11" fill="#166534"><tspan font-weight="600">&#9313; Brief</tspan> &#8212; composition + copy</text>

  <rect x="400" y="372" width="175" height="30" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="410" y="392" font-size="11" fill="#166534"><tspan font-weight="600">&#9314; Prompt</tspan> &#8212; cinematic text</text>

  <!-- Arrows: core -> steps -->
  <line x1="338" y1="340" x2="398" y2="311" stroke="#86efac" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="338" y1="352" x2="398" y2="349" stroke="#86efac" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="338" y1="364" x2="398" y2="387" stroke="#86efac" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Config notes -->
  <rect x="620" y="296" width="145" height="36" rx="4" fill="#f3e8ff" stroke="#c084fc" stroke-width="1"/>
  <text x="630" y="312" font-size="10" font-weight="600" fill="#7c3aed">System Prompt</text>
  <text x="630" y="325" font-size="9" fill="#9333ea">prompts.py</text>

  <rect x="620" y="342" width="145" height="36" rx="4" fill="#f3e8ff" stroke="#c084fc" stroke-width="1"/>
  <text x="630" y="358" font-size="10" font-weight="600" fill="#7c3aed">Field Schema</text>
  <text x="630" y="371" font-size="9" fill="#9333ea">schema.py</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- LOOP 1 (left) -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="18" y="140" width="130" height="180" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.2" stroke-dasharray="6 3" opacity="0.9"/>
  <text x="83" y="162" text-anchor="middle" font-size="10.5" font-weight="700" fill="#dc2626">Loop 1</text>
  <text x="83" y="176" text-anchor="middle" font-size="9.5" fill="#ef4444">Info Gathering</text>

  <rect x="33" y="245" width="100" height="34" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="83" y="266" text-anchor="middle" font-size="9.5" fill="#b91c1c">Ask for missing</text>
  <text x="83" y="277" text-anchor="middle" font-size="9.5" fill="#b91c1c">fields</text>

  <!-- Loop 1 arrows -->
  <path d="M 162 352 L 135 352 L 135 280" fill="none" stroke="#ef4444" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arrow-red)"/>
  <text x="104" y="342" font-size="8.5" fill="#ef4444" font-style="italic">missing</text>
  <path d="M 83 245 L 83 178 L 170 178" fill="none" stroke="#ef4444" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arrow-red)"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- LOOP 2 (right) -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="800" y="140" width="86" height="282" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.2" stroke-dasharray="6 3" opacity="0.9"/>
  <text x="843" y="162" text-anchor="middle" font-size="10.5" font-weight="700" fill="#dc2626">Loop 2</text>
  <text x="843" y="176" text-anchor="middle" font-size="9.5" fill="#ef4444">Revision</text>

  <rect x="808" y="205" width="70" height="40" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="843" y="222" text-anchor="middle" font-size="9" fill="#b91c1c">Review</text>
  <text x="843" y="234" text-anchor="middle" font-size="9" fill="#b91c1c">+ Approve</text>

  <!-- Loop 2 arrows -->
  <path d="M 575 349 L 770 349 L 770 225 L 808 225" fill="none" stroke="#ef4444" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arrow-red)"/>
  <text x="750" y="282" font-size="8.5" fill="#ef4444" font-style="italic" transform="rotate(-90, 750, 282)">brief</text>
  <path d="M 843 205 L 843 178 L 730 178" fill="none" stroke="#ef4444" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arrow-red)"/>
  <path d="M 843 245 L 843 395 L 450 395 L 450 424" fill="none" stroke="#ef4444" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arrow-red)"/>
  <text x="680" y="410" font-size="8.5" fill="#ef4444" font-style="italic">feedback</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- Arrow: Agent -> Generation -->
  <!-- ═══════════════════════════════════════ -->
  <line x1="350" y1="424" x2="260" y2="470" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="424" x2="600" y2="470" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="220" y="452" font-size="9" fill="#64748b" font-style="italic">text prompt</text>
  <text x="530" y="452" font-size="9" fill="#64748b" font-style="italic">style image + text</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- IMAGE GENERATION -->
  <!-- ═══════════════════════════════════════ -->
  <text x="120" y="460" font-size="11" font-weight="600" fill="#b45309">Image Generation</text>
  <text x="120" y="475" font-size="10" fill="#d97706" font-style="italic">generate.py</text>

  <!-- GPT Image -->
  <rect x="140" y="490" width="240" height="70" rx="10" fill="#fefce8" stroke="#fbbf24" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="515" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">GPT Image 1.5</text>
  <text x="260" y="533" text-anchor="middle" font-size="10" fill="#a16207">OpenAI &#183; Text prompt only</text>
  <text x="260" y="548" text-anchor="middle" font-size="10" fill="#a16207">Style via text directive</text>

  <!-- Gemini -->
  <rect x="480" y="490" width="260" height="70" rx="10" fill="#fefce8" stroke="#fbbf24" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="610" y="515" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Gemini 2.5 Flash</text>
  <text x="610" y="533" text-anchor="middle" font-size="10" fill="#a16207">Google &#183; Multimodal</text>
  <text x="610" y="548" text-anchor="middle" font-size="10" fill="#a16207">Style reference image + text prompt</text>

  <!-- Arrows: APIs -> Output -->
  <line x1="260" y1="560" x2="380" y2="600" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="610" y1="560" x2="500" y2="600" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- OUTPUT -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="310" y="602" width="260" height="52" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="626" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Ad Campaign Image</text>
  <text x="440" y="644" text-anchor="middle" font-size="10.5" fill="#15803d">PNG &#183; Configurable resolution &#183; Download</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="590" y="662" width="295" height="50" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <ellipse cx="610" cy="680" rx="7" ry="5" fill="#1e3a5f"/>
  <text x="622" y="684" font-size="9" fill="#64748b">Conversation agent</text>
  <rect x="710" y="676" width="12" height="8" rx="2" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="726" y="684" font-size="9" fill="#64748b">Pipeline steps</text>
  <rect x="600" y="696" width="12" height="8" rx="2" fill="#fefce8" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="616" y="704" font-size="9" fill="#64748b">Generation APIs</text>
  <line x1="710" y1="700" x2="730" y2="700" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4 2"/>
  <text x="734" y="704" font-size="9" fill="#64748b">Feedback loops</text>
</svg>
